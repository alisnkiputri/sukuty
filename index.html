<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Sukuty - Web Version</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50; /* Warna gelap latar belakang monitor */
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden; /* Mencegah scroll saat main di HP */
        }

        #game-container {
            position: relative;
            background-color: #f1c40f; /* Bingkai kuning tebal */
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
        }

        #header-text {
            margin-bottom: 10px;
        }

        #game-title {
            font-size: 24px;
            font-weight: bold;
            color: #d35400; /* Warna oranye judul */
            margin: 0;
        }

        #game-instruction {
            font-size: 12px;
            color: #34495e; /* Warna gelap teks instruksi */
            margin: 2px 0 0 0;
        }

        /* Area Canvas Game */
        #gameCanvas {
            background-color: #bdc3c7; /* Latar biru muda layar game */
            border-radius: 8px;
            display: block; /* Menghilangkan celah bawah canvas */
            cursor: none; /* Sembunyikan kursor saat di canvas */
        }

        /* Overlay Tombol Kontrol Bawah (seperti di gambar) */
        #controls-container {
            display: flex;
            justify-content: space-around;
            width: 100%;
            margin-top: 15px;
        }

        .control-btn {
            background-color: #bdc3c7;
            border: none;
            color: #34495e;
            font-size: 24px;
            padding: 10px 30px;
            border-radius: 10px;
            box-shadow: 0 5px #7f8c8d;
            cursor: pointer;
            outline: none;
            transition: all 0.1s;
        }

        .control-btn:active {
            box-shadow: 0 2px #7f8c8d;
            transform: translateY(3px);
        }

        /* Pesan Game Over */
        #game-over-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 10px;
            display: none; /* Sembunyi awal */
            z-index: 10;
        }

    </style>
</head>
<body>

    <div id="game-container">
        <div id="header-text">
            <h1 id="game-title">GAME SUKUTY 🛵✨</h1>
            <p id="game-instruction">Sentuh tombol di bawah atau gunakan panah keyboard untuk menghindari mobil!</p>
        </div>

        <canvas id="gameCanvas" width="360" height="480"></canvas>

        <div id="game-over-msg">
            <h2>GAME OVER!</h2>
            <p id="final-money">Total Uang: Rp 0</p>
            <button onclick="resetGame()" style="padding: 10px 20px; font-size: 16px; cursor: pointer;">Main Lagi</button>
        </div>

        <div id="controls-container">
            <button class="control-btn" id="btn-left">◀️</button>
            <button class="control-btn" id="btn-right">▶️</button>
        </div>
    </div>

    <script>
        // --- Konfigurasi Game ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const moneyDisplay = document.getElementById('final-money');
        const gameOverMsg = document.getElementById('game-over-msg');

        // Dimensi objek (px)
        const playerWidth = 40;
        const playerHeight = 60;
        const obstacleWidth = 50;
        const obstacleHeight = 50;
        const coinRadius = 25; // Diameter 50px

        // State Game
        let isGameRunning = true;
        let moneyScore = 0;
        let gameLevel = 1;
        let frames = 0;
        
        // Posisi Pemain (Skuter merah)
        let player = {
            x: canvas.width / 2 - playerWidth / 2, // Tengah awal
            y: canvas.height - playerHeight - 20, // Dekat bawah
            speed: 5
        };

        // Array untuk menyimpan objek dinamis
        let obstacles = [];
        let coins = [];

        // Kecepatan objek jatuh (meningkat seiring level)
        let baseFallSpeed = 3;

        // Kontrol Input
        let keys = {
            left: false,
            right: false
        };

        // --- Event Listeners (Keyboard & Tombol UI) ---
        
        // Keyboard (PC)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') keys.left = true;
            if (e.key === 'ArrowRight') keys.right = true;
        });
        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft') keys.left = false;
            if (e.key === 'ArrowRight') keys.right = false;
        });

        // Tombol UI Bawah (Mobile/Sentuh)
        document.getElementById('btn-left').addEventListener('touchstart', (e) => { e.preventDefault(); keys.left = true; });
        document.getElementById('btn-left').addEventListener('touchend', () => keys.left = false);
        document.getElementById('btn-right').addEventListener('touchstart', (e) => { e.preventDefault(); keys.right = true; });
        document.getElementById('btn-right').addEventListener('touchend', () => keys.right = false);
        
        // Dukungan klik mouse untuk tombol UI (PC)
        document.getElementById('btn-left').addEventListener('mousedown', () => keys.left = true);
        document.getElementById('btn-left').addEventListener('mouseup', () => keys.left = false);
        document.getElementById('btn-right').addEventListener('mousedown', () => keys.right = true);
        document.getElementById('btn-right').addEventListener('mouseup', () => keys.right = false);


        // --- Fungsi Utama Game ---

        function drawPlayer() {
            // Placeholder Skuter Merah (Kotak Merah)
            // Ganti dengan ctx.drawImage(img, ...) jika ada file gambar
            ctx.fillStyle = '#e74c3c'; // Merah Alizarin
            ctx.fillRect(player.x, player.y, playerWidth, playerHeight);
            
            // Gambar detail sederhana skuter (Lampu depan)
            ctx.fillStyle = 'white';
            ctx.fillRect(player.x + 15, player.y + 5, 10, 10);
        }

        function drawObjects() {
            // Menggambar Rintangan (Kotak Biru)
            ctx.fillStyle = '#3498db'; // Biru Peter River
            obstacles.forEach(obs => {
                ctx.fillRect(obs.x, obs.y, obstacleWidth, obstacleHeight);
            });

            // Menggambar Koin (Lingkaran Emas)
            // Ganti dengan koin berwajah jika ada gambar
            ctx.fillStyle = '#f1c40f'; // Emas
            ctx.strokeStyle = '#d35400'; // Oranye gelap untuk pinggiran
            ctx.lineWidth = 3;
            coins.forEach(coin => {
                ctx.beginPath();
                ctx.arc(coin.x, coin.y, coinRadius, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
                
                // Gambar simbol '$' sederhana di tengah koin
                ctx.fillStyle = '#d35400';
                ctx.font = 'bold 20px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('$', coin.x, coin.y);
            });
        }

        function drawUI() {
            // Area Teks UI di dalam Canvas (seperti di gambar)
            ctx.fillStyle = '#34495e'; // Warna gelap teks
            ctx.font = 'bold 18px Segoe UI';
            ctx.textAlign = 'left';
            ctx.fillText(`Uang: Rp ${moneyScore.toLocaleString('id-ID')}`, 15, 25);
            
            ctx.fillStyle = '#f1c40f'; // Warna kuning level
            ctx.font = 'bold 14px Segoe UI';
            ctx.fillText(`Kecepatan: Lvl ${gameLevel}`, 15, 45);
        }

        function drawRoadLines() {
            // Garis putus-putus tengah jalan
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 4;
            ctx.setLineDash([20, 20]); // Putus-putus 20px, spasi 20px
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]); // Reset agar garis lain tidak putus-putus
        }

        // --- Logika Game (Update & Pergerakan) ---

        function updateGame() {
            if (!isGameRunning) return;

            frames++;

            // Pergerakan Pemain
            if (keys.left && player.x > 0) {
                player.x -= player.speed;
            }
            if (keys.right && player.x < canvas.width - playerWidth) {
                player.x += player.speed;
            }

            // Spawn objek baru secara acak
            // Munculkan rintangan setiap 100 frame
            if (frames % 100 === 0) {
                let spawnX = Math.random() * (canvas.width - obstacleWidth);
                obstacles.push({ x: spawnX, y: -obstacleHeight });
            }
            // Munculkan koin setiap 150 frame (lebih jarang)
            if (frames % 150 === 0) {
                let spawnX = Math.random() * (canvas.width - (coinRadius * 2)) + coinRadius;
                coins.push({ x: spawnX, y: -coinRadius * 2 });
            }

            // Pergerakan objek jatuh
            let currentSpeed = baseFallSpeed + (gameLevel * 0.5);
            obstacles.forEach(obs => obs.y += currentSpeed);
            coins.forEach(coin => coin.y += currentSpeed * 0.8); // Koin sedikit lebih lambat

            // Hapus objek yang keluar layar (optimasi memori)
            obstacles = obstacles.filter(obs => obs.y < canvas.height);
            coins = coins.filter(coin => coin.y < canvas.height);

            // Cek Tabrakan (Collisions)
            checkCollisions();

            // Naikkan Level seiring waktu
            if (frames % 1000 === 0) { // Setiap ~16 detik
                gameLevel++;
            }
        }

        function checkCollisions() {
            const playerRect = {
                left: player.x,
                right: player.x + playerWidth,
                top: player.y,
                bottom: player.y + playerHeight
            };

            // Cek tabrakan rintangan (Kotak vs Kotak)
            for (let i = 0; i < obstacles.length; i++) {
                const obs = obstacles[i];
                if (
                    playerRect.left < obs.x + obstacleWidth &&
                    playerRect.right > obs.x &&
                    playerRect.top < obs.y + obstacleHeight &&
                    playerRect.bottom > obs.y
                ) {
                    // Game Over jika menabrak kotak biru
                    endGame();
                    return;
                }
            }

            // Cek koleksi koin (Kotak vs Lingkaran - disederhanakan)
            for (let i = coins.length - 1; i >= 0; i--) {
                const coin = coins[i];
                // Hitung jarak pusat koin ke titik terdekat di kotak pemain
                let closestX = Math.max(playerRect.left, Math.min(coin.x, playerRect.right));
                let closestY = Math.max(playerRect.top, Math.min(coin.y, playerRect.bottom));
                
                let distanceX = coin.x - closestX;
                let distanceY = coin.y - closestY;
                let distanceSquared = (distanceX * distanceX) + (distanceY * distanceY);

                if (distanceSquared < (coinRadius * coinRadius)) {
                    // Koin terkoleksi
                    moneyScore += 100; // Contoh nilai koin
                    coins.splice(i, 1); // Hapus koin dari array
                }
            }
        }

        function endGame() {
            isGameRunning = false;
            moneyDisplay.textContent = `Total Uang: Rp ${moneyScore.toLocaleString('id-ID')}`;
            gameOverMsg.style.display = 'block';
        }

        function resetGame() {
            // Reset semua state
            isGameRunning = true;
            moneyScore = 0;
            gameLevel = 1;
            frames = 0;
            player.x = canvas.width / 2 - playerWidth / 2;
            obstacles = [];
            coins = [];
            gameOverMsg.style.display = 'none';
        }

        // --- Loop Utama Game ---

        function gameLoop() {
            // Bersihkan Canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Gambar elemen
            drawRoadLines();
            drawObjects();
            drawPlayer();
            drawUI();

            // Update logika
            updateGame();

            // Minta frame berikutnya
            requestAnimationFrame(gameLoop);
        }

        // Mulai game
        gameLoop();

    </script>
</body>
</html>
