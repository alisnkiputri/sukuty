<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Game Sukuty - Maju Otomatis & Visual Gambar</title>
    <style>
        /* --- Reset & Layout Dasar --- */
        body {
            margin: 0;
            padding: 0;
            background: #2c3e50;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        #header-text {
            text-align: center;
            margin-bottom: 10px;
        }

        #game-title {
            margin: 5px 0 2px 0;
            font-size: 24px;
            color: #f1c40f;
            text-shadow: 2px 2px #d35400;
        }

        #instruction {
            margin: 0;
            color: #bdc3c7;
            font-size: 12px;
        }

        /* --- Bingkai Canvas --- */
        #game-viewport {
            position: relative;
            background-color: #bdc3c7;
            border: 4px solid #f1c40f;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            max-width: 90vw;
            max-height: 60vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #gameCanvas {
            display: block;
            background: #bdc3c7;
            cursor: none;
        }

        /* --- Layar Game Over --- */
        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
            border-radius: 8px;
        }

        #game-over-screen h2 {
            font-size: 32px;
            color: #e74c3c;
            margin: 0 0 10px 0;
        }

        #game-over-screen p {
            margin: 5px 0;
            font-size: 18px;
        }

        #restart-btn {
            margin-top: 20px;
            padding: 12px 24px;
            font-size: 18px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px #27ae60;
            outline: none;
        }
        
        #restart-btn:active {
            box-shadow: 0 1px #27ae60;
            transform: translateY(3px);
        }

        /* --- Tombol Kontrol Bawah (Kiri & Kanan) --- */
        .mobile-controls {
            display: flex;
            justify-content: space-between;
            width: 85vw;
            max-width: 320px;
            margin-top: 15px;
        }

        .btn-control {
            width: 45%;
            height: 60px;
            background-color: #e74c3c;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 6px #c0392b;
            touch-action: manipulation;
            cursor: pointer;
            outline: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-control:active {
            box-shadow: 0 2px #c0392b;
            transform: translateY(4px);
            background-color: #d63031;
        }

    </style>
</head>
<body>

    <div id="header-text">
        <h1 id="game-title">GAME SUKUTY <span class="emoji">🛵✨</span></h1>
        <p id="instruction">Skuter maju otomatis! Hindari mobil & kumpulkan koin!</p>
    </div>

    <div id="game-viewport">
        <canvas id="gameCanvas" width="360" height="480"></canvas>

        <div id="game-over-screen">
            <h2>GAME OVER!</h2>
            <p id="final-money">Total Uang: Rp 0</p>
            <button id="restart-btn">Main Lagi</button>
        </div>
    </div>

    <div class="mobile-controls">
        <button class="btn-control" id="btnLeft">◀️</button>
        <button class="btn-control" id="btnRight">▶️</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalMoneyText = document.getElementById('final-money');

        // --- MANAJEMEN PEMUATAN GAMBAR ---
        const images = {};
        const imageSources = {
            car: 'https://i.ibb.co/sK08x4N/green-car.png',  // Gambar Mobil Musuh
            coin: 'https://i.ibb.co/L5Qh4cQ/smiley-coin.png' // Gambar Koin Emas
        };

        let loadedImagesCount = 0;
        const totalImages = Object.keys(imageSources).length;

        // Load semua gambar sebelum game berjalan
        for (let src in imageSources) {
            images[src] = new Image();
            images[src].src = imageSources[src];
            images[src].onload = () => {
                loadedImagesCount++;
            };
            images[src].onerror = () => {
                console.warn(`Gagal memuat gambar ${src}. Menggunakan fallback visual.`);
                loadedImagesCount++;
            };
        }

        // Dimensi Objek
        const playerWidth = 40;
        const playerHeight = 60;
        const obstacleWidth = 50;
        const obstacleHeight = 60;
        const coinRadius = 20;

        // State Game
        let isGameRunning = true;
        let moneyScore = 0;
        let frames = 0;
        let baseSpeed = 4;
        let currentSpeed = 4;
        
        // Posisi Pemain
        let player = {
            x: canvas.width / 2 - playerWidth / 2,
            y: canvas.height - playerHeight - 40,
            speed: 5
        };

        let obstacles = [];
        let coins = [];

        // Kontrol Input Kiri/Kanan
        let keys = { left: false, right: false };

        // Keyboard Event
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') keys.left = true;
            if (e.key === 'ArrowRight') keys.right = true;
        });
        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft') keys.left = false;
            if (e.key === 'ArrowRight') keys.right = false;
        });

        // Binding Tombol Sentuh
        function bindButton(id, keyName) {
            const btn = document.getElementById(id);
            const start = (e) => { e.preventDefault(); keys[keyName] = true; };
            const end = () => { keys[keyName] = false; };
            
            btn.addEventListener('touchstart', start);
            btn.addEventListener('touchend', end);
            btn.addEventListener('mousedown', start);
            btn.addEventListener('mouseup', end);
            btn.addEventListener('mouseleave', end);
        }

        bindButton('btnRight', 'right');

        // --- RENDER GRAFIS ---

        function drawPlayer() {
            // Skuter Merah Pemain
            ctx.fillStyle = '#e74c3c';
            ctx.fillRect(player.x, player.y, playerWidth, playerHeight);
            
            // Lampu depan
            ctx.fillStyle = '#f1c40f';
            ctx.fillRect(player.x + 12, player.y + 5, 16, 8);
        }

        function drawObjects() {
            // Draw Obstacles (Mobil)
            obstacles.forEach(obs => {
                if (images.car.complete && images.car.naturalWidth !== 0) {
                    ctx.drawImage(images.car, obs.x, obs.y, obstacleWidth, obstacleHeight);
                } else {
                    // Fallback jika gambar gagal dimuat
                    ctx.fillStyle = '#3498db';
                    ctx.fillRect(obs.x, obs.y, obstacleWidth, obstacleHeight);
                }
            });

            // Draw Coins (Koin Berwajah)
            coins.forEach(coin => {
                if (images.coin.complete && images.coin.naturalWidth !== 0) {
                    ctx.drawImage(images.coin, coin.x - coinRadius, coin.y - coinRadius, coinRadius * 2, coinRadius * 2);
                } else {
                    // Fallback koin emas manual
                    ctx.fillStyle = '#f1c40f';
                    ctx.beginPath();
                    ctx.arc(coin.x, coin.y, coinRadius, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

            ctx.fillStyle = '#2c3e50';
            ctx.font = 'bold 16px Segoe UI';
            ctx.textAlign = 'left';
            ctx.fillText(`Uang: Rp ${moneyScore.toLocaleString('id-ID')}`, 15, 25);
