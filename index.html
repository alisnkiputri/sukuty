<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Game Sukuty Mobile</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #2c3e50;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        h1 {
            margin: 5px 0 2px 0;
            font-size: 24px;
            color: #f1c40f;
            text-shadow: 2px 2px #d35400;
        }
        p {
            margin: 0 0 10px 0;
            color: #bdc3c7;
            font-size: 12px;
        }
        #gameCanvas {
            background: #34495e;
            border: 4px solid #f1c40f;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            display: block;
            max-width: 90vw;
            max-height: 60vh;
        }
        /* Kontrol Khusus HP Android */
        .mobile-controls {
            display: flex;
            justify-content: space-between;
            width: 85vw;
            max-width: 400px;
            margin-top: 15px;
        }
        .btn-control {
            width: 45%;
            height: 60px;
            background: #e74c3c;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 6px #c0392b;
            touch-action: manipulation;
        }
        .btn-control:active {
            box-shadow: 0 2px #c0392b;
            transform: translateY(4px);
            background: #d63031;
        }
    </style>
</head>
<body>

    <h1>GAME SUKUTY 🛵✨</h1>
    <p>Sentuh tombol di bawah untuk menghindari mobil!</p>

    <canvas id="gameCanvas" width="400" height="500"></canvas>

    <div class="mobile-controls">
        <button class="btn-control" id="btnLeft">◀️</button>
        <button class="btn-control" id="btnRight">▶️</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // State Game
        let score = 0;
        let gameOver = false;
        let frames = 0;

        // Karakter Sukuty (Pemain)
        const scooty = {
            x: canvas.width / 2 - 15,
            y: canvas.height - 90,
            width: 30,
            height: 50,
            speed: 6,
            color: '#e74c3c'
        };

        // Rintangan & Koin
        let obstacles = [];
        let coins = [];

        // Kontrol Input (PC & HP)
        let keys = {};
        let isMovingLeft = false;
        let isMovingRight = false;

        // Event Listener PC
        document.addEventListener('keydown', (e) => keys[e.key] = true);
        document.addEventListener('keyup', (e) => keys[e.key] = false);

        // Event Listener HP (Touch)
        const btnLeft = document.getElementById('btnLeft');
        const btnRight = document.getElementById('btnRight');

        btnLeft.addEventListener('touchstart', (e) => { e.preventDefault(); isMovingLeft = true; });
        btnLeft.addEventListener('touchend', () => isMovingLeft = false);
        btnRight.addEventListener('touchstart', (e) => { e.preventDefault(); isMovingRight = true; });
        btnRight.addEventListener('touchend', () => isMovingRight = false);

        // Klik canvas untuk restart saat Game Over
        canvas.addEventListener('touchstart', () => {
            if (gameOver) resetGame();
        });
        canvas.addEventListener('click', () => {
            if (gameOver) resetGame();
        });

        function resetGame() {
            score = 0;
            gameOver = false;
            frames = 0;
            scooty.x = canvas.width / 2 - 15;
            obstacles = [];
            coins = [];
        }

        function spawnObjects() {
            // Kalkulasi Kecepatan Ekstra Berdasarkan Skor
            let speedBonus = Math.floor(score / 30) * 0.8; 
            
            // Interval Spawn Rintangan (Semakin tinggi skor, semakin sering muncul)
            let spawnIntervalObs = Math.max(25, 80 - Math.floor(score / 20) * 5);

            if (frames % spawnIntervalObs === 0) { 
                let obsX = Math.random() * (canvas.width - 40);
                obstacles.push({ 
                    x: obsX, 
                    y: -50, 
                    width: 40, 
                    height: 40, 
                    speed: 4.5 + speedBonus 
                });
            }

            if (frames % 100 === 0) { 
                let coinX = Math.random() * (canvas.width - 20);
                coins.push({ 
                    x: coinX, 
                    y: -30, 
                    radius: 10, 
                    speed: 3.5 + speedBonus 
                });
            }
        }

        function update() {
            if (gameOver) return;

            frames++;
            spawnObjects();

            // Gerakan pemain (Gabungan Keyboard PC + Touch HP)
            if ((keys['ArrowLeft'] || keys['a'] || keys['A'] || isMovingLeft) && scooty.x > 0) {
                scooty.x -= scooty.speed;
            }
            if ((keys['ArrowRight'] || keys['d'] || keys['D'] || isMovingRight) && scooty.x < canvas.width - scooty.width) {
                scooty.x += scooty.speed;
            }

            // Update Rintangan
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].y += obstacles[i].speed;

                // Cek Tabrakan Rintangan
                if (scooty.x < obstacles[i].x + obstacles[i].width &&
                    scooty.x + scooty.width > obstacles[i].x &&
                    scooty.y < obstacles[i].y + obstacles[i].height &&
                    scooty.y + scooty.height > obstacles[i].y) {
                    gameOver = true;
                }

                if (obstacles[i].y > canvas.height) obstacles.splice(i, 1);
            }

            // Update Koin
            for (let i = coins.length - 1; i >= 0; i--) {
                coins[i].y += coins[i].speed;

                // Cek Ambil Koin
                let distX = Math.abs(coins[i].x - (scooty.x + scooty.width/2));
                let distY = Math.abs(coins[i].y - (scooty.y + scooty.height/2));

                if (distX < (scooty.width/2 + coins[i].radius) && distY < (scooty.height/2 + coins[i].radius)) {
