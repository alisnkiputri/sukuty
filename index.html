<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Sukuty - Web Version</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50; /* Warna gelap latar belakang monitor */
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden; /* Mencegah scroll saat main di HP */
        }

        #game-container {
            position: relative;
            background-color: #f1c40f; /* Bingkai kuning tebal */
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
        }

        #header-text {
            margin-bottom: 10px;
        }

        #game-title {
            font-size: 24px;
            font-weight: bold;
            color: #d35400; /* Warna oranye judul */
            margin: 0;
        }

        #game-instruction {
            font-size: 12px;
            color: #34495e; /* Warna gelap teks instruksi */
            margin: 2px 0 0 0;
        }

        /* Area Canvas Game */
        #gameCanvas {
            background-color: #bdc3c7; /* Latar biru muda layar game */
            border-radius: 8px;
            display: block; /* Menghilangkan celah bawah canvas */
            cursor: none; /* Sembunyikan kursor saat di canvas */
        }

        /* Overlay Tombol Kontrol Bawah */
        #controls-container {
            display: flex;
            justify-content: space-around;
            width: 100%;
            margin-top: 15px;
        }

        .control-btn {
            background-color: #bdc3c7;
            border: none;
            color: #34495e;
            font-size: 24px;
            padding: 10px 30px;
            border-radius: 10px;
            box-shadow: 0 5px #7f8c8d;
            cursor: pointer;
            outline: none;
            transition: all 0.1s;
        }

        .control-btn:active {
            box-shadow: 0 2px #7f8c8d;
            transform: translateY(3px);
        }

        /* Pesan Game Over */
        #game-over-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0,0,0,0.9);
            padding: 30px;
            border-radius: 15px;
            display: none; /* Sembunyi awal */
            z-index: 100;
        }

        /* Layar Loading awal */
        #loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            z-index: 50;
        }

    </style>
</head>
<body>

    <div id="game-container">
        <div id="header-text">
            <h1 id="game-title">GAME SUKUTY 🛵✨</h1>
            <p id="game-instruction">Sentuh tombol di bawah atau gunakan panah keyboard untuk menghindari kotak dan ambil koin!</p>
        </div>

        <div style="position: relative;">
            <canvas id="gameCanvas" width="360" height="480"></canvas>
            
            <div id="loading-screen">
                <h3>Memuat Gambar...</h3>
            </div>

            <div id="game-over-msg">
                <h2>GAME OVER!</h2>
                <p id="final-money">Total Uang: Rp 0</p>
                <button onclick="resetGame()" style="padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #2ecc71; color: white; border: none; border-radius: 5px;">Main Lagi</button>
            </div>
        </div>

        <div id="controls-container">
            <button class="control-btn" id="btn-left">◀️</button>
            <button class="control-btn" id="btn-right">▶️</button>
        </div>
    </div>

    <script>
        // --- Konfigurasi Game ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const moneyDisplay = document.getElementById('final-money');
        const gameOverMsg = document.getElementById('game-over-msg');
        const loadingScreen = document.getElementById('loading-screen');

        // Dimensi objek (px) - disesuaikan agar proporsional dengan gambar
        const playerWidth = 60; // Sedikit lebih lebar untuk mobil
        const playerHeight = 50;
        const obstacleWidth = 50;
        const obstacleHeight = 50;
        const coinRadius = 25; // Diameter 50px

        // State Game
        let isGameRunning = false;
        let isImagesLoaded = false;
        let moneyScore = 0;
        let gameLevel = 1;
        let frames = 0;
        
        // Posisi Pemain
        let player = {
            x: canvas.width / 2 - playerWidth / 2, // Tengah awal
            y: canvas.height - playerHeight - 30, // Dekat bawah
            speed: 6 // Sedikit lebih cepat
        };

        // Array untuk menyimpan objek dinamis
        let obstacles = [];
        let coins = [];

        // Kecepatan objek jatuh
        let baseFallSpeed = 4;

        // Kontrol Input
        let keys = { left: false, right: false };

        // --- PEMUATAN GAMBAR (Penting!) ---
        let imagesToLoad = 0;
        let imagesLoadedCount = 0;

        function loadImage(src) {
            imagesToLoad++;
            const img = new Image();
            img.src = src;
            img.onload = () => {
                imagesLoadedCount++;
                if (imagesLoadedCount === imagesToLoad) {
                    isImagesLoaded = true;
                    loadingScreen.style.display = 'none';
                    // Mulai game loop setelah gambar dimuat
                    isGameRunning = true;
                    gameLoop();
                }
            };
            img.onerror = () => {
                console.error("Gagal memuat gambar: " + src);
                loadingScreen.innerHTML = "<h3>Gagal Memuat Gambar. Periksa Koneksi Internet.</h3>";
            };
            return img;
        }

        // --- Link Gambar Contoh (VW Beetle Hijau dan Koin Sun-Face) ---
        // Ganti link ini jika Anda memiliki file gambar sendiri
        const playerImg = loadImage('https://images.vexels.com/media/users/3/152914/isolated/preview/26e3c54d5884ffb9a2c3e1e813f04f2f-cartoon-vw-beetle-car-by-vexels.png');
        const coinImg = loadImage('https://upload.wikimedia.org/wikipedia/commons/e/e0/Openclipart_costume_golden_sun_mask.svg'); // Representasi sun-face koin

        // --- Event Listeners ---
        // Keyboard (PC)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') keys.left = true;
            if (e.key === 'ArrowRight') keys.right = true;
        });
        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft') keys.left = false;
            if (e.key === 'ArrowRight') keys.right = false;
        });

        // Tombol UI Bawah (Mobile/Sentuh)
        document.getElementById('btn-left').addEventListener('touchstart', (e) => { e.preventDefault(); keys.left = true; });
        document.getElementById('btn-left').addEventListener('touchend', () => keys.left = false);
        document.getElementById('btn-right').addEventListener('touchstart', (e) => { e.preventDefault(); keys.right = true; });
        document.getElementById('btn-right').addEventListener('touchend', () => keys.right = false);
        
        // Mouse untuk PC
        document.getElementById('btn-left').addEventListener('mousedown', () => keys.left = true);
        document.getElementById('btn-left').addEventListener('mouseup', () => keys.left = false);
        document.getElementById('btn-right').addEventListener('mousedown', () => keys.right = true);
        document.getElementById('btn-right').addEventListener('mouseup', () => keys.right = false);

        // --- Fungsi Utama Game ---

        function drawPlayer() {
            // Gambar Mobil Hijau (Gambar Asli)
            ctx.drawImage(playerImg, player.x, player.y, playerWidth, playerHeight);
        }

        function drawObjects() {
            // Rintangan Kotak Biru (Masih sama seperti di gambar)
            ctx.fillStyle = '#3498db'; 
            obstacles.forEach(obs => {
                ctx.fillRect(obs.x, obs.y, obstacleWidth, obstacleHeight);
            });

            // Koin Emas Sun-Face (Gambar Asli)
            coins.forEach(coin => {
                // Gambar koin sebagai lingkaran untuk tabrakan, lalu draw gambar di atasnya
                ctx.drawImage(coinImg, coin.x - coinRadius, coin.y - coinRadius, coinRadius * 2, coinRadius * 2);
            });
        }

        function drawUI() {
            ctx.fillStyle = '#34495e';
            ctx.font = 'bold 18px Segoe UI';
            ctx.textAlign = 'left';
            ctx.fillText(`Uang: Rp ${moneyScore.toLocaleString('id-ID')}`, 15, 25);
            
            ctx.fillStyle = '#f1c40f';
            ctx.font = 'bold 14px Segoe UI';
            ctx.fillText(`Kecepatan: Lvl ${gameLevel}`, 15, 45);
        }

        function drawRoadLines() {
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 4;
            ctx.setLineDash([20, 20]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // --- Logika Game ---

        function updateGame() {
            if (!isGameRunning || !isImagesLoaded) return;

            frames++;

            // Pergerakan Pemain
            if (keys.left && player.x > 0) {
                player.x -= player.speed;
            }
            if (keys.right && player.x < canvas.width - playerWidth) {
                player.x += player.speed;
            }

            // Spawn objek baru
            if (frames % 100 === 0) { // Kotak biru
                let spawnX = Math.random() * (canvas.width - obstacleWidth);
                obstacles.push({ x: spawnX, y: -obstacleHeight });
            }
            if (frames % 130 === 0) { // Koin emas
                let spawnX = Math.random() * (canvas.width - (coinRadius * 2)) + coinRadius;
                coins.push({ x: spawnX, y: -coinRadius * 2 });
            }

            // Pergerakan objek jatuh
            let currentSpeed = baseFallSpeed + (gameLevel * 0.5);
            obstacles.forEach(obs => obs.y += currentSpeed);
            coins.forEach(coin => coin.y += currentSpeed * 0.8);

            // Cek Tabrakan
            checkCollisions();

            // Naikkan Level
            if (frames % 1000 === 0) {
                gameLevel++;
            }
        }

        function checkCollisions() {
            // Hitbox pemain sedikit disempitkan agar lebih fair dengan gambar mobil
            const playerRect = {
                left: player.x + 5,
                right: player.x + playerWidth - 5,
                top: player.y + 5,
                bottom: player.y + playerHeight - 5
            };

            // Cek rintangan kotak
            for (let i = 0; i < obstacles.length; i++) {
                const obs = obstacles[i];
                if (
                    playerRect.left < obs.x + obstacleWidth &&
                    playerRect.right > obs.x &&
                    playerRect.top < obs.y + obstacleHeight &&
                    playerRect.bottom > obs.y
                ) {
                    endGame();
                    return;
                }
            }

            // Cek koin
            for (let i = coins.length - 1; i >= 0; i--) {
                const coin = coins[i];
                let closestX = Math.max(playerRect.left, Math.min(coin.x, playerRect.right));
                let closestY = Math.max(playerRect.top, Math.min(coin.y, playerRect.bottom));
                
                let distanceX = coin.x - closestX;
                let distanceY = coin.y - closestY;
                let distanceSquared = (distanceX * distanceX) + (distanceY * distanceY);

                if (distanceSquared < (coinRadius * coinRadius)) {
                    moneyScore += 100;
                    coins.splice(i, 1);
                }
            }
        }

        function endGame() {
            isGameRunning = false;
            moneyDisplay.textContent = `Total Uang: Rp ${moneyScore.toLocaleString('id-ID')}`;
            gameOverMsg.style.display = 'block';
        }

        function resetGame() {
            isGameRunning = true;
            moneyScore = 0;
            gameLevel = 1;
            frames = 0;
            player.x = canvas.width / 2 - playerWidth / 2;
            obstacles = [];
            coins = [];
            gameOverMsg.style.display = 'none';
        }

        // --- Loop Utama Game ---
        function gameLoop() {
            if (!isImagesLoaded) return; // Tunggu gambar dimuat

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawRoadLines();
            drawObjects();
            drawPlayer();
            drawUI();
            updateGame();

            requestAnimationFrame(gameLoop);
        }

        // Game akan otomatis mulai saat gambar dimuat (lihat fungsi loadImage)

    </script>
</body>
</html>
