<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Game Sukuty Mobile</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #2c3e50;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            position: relative;
        }

        /* Logos di Pojok Kiri Atas */
        .top-left-logos {
            position: absolute;
            top: 10px;
            left: 10px;
            display: flex;
            gap: 8px;
            z-index: 100;
        }

        .top-left-logos img {
            width: 45px;
            height: 45px;
            object-fit: cover;
            border-radius: 6px;
            border: 2px solid #f1c40f;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.4);
        }

        h1 {
            margin: 5px 0 2px 0;
            font-size: 24px;
            color: #f1c40f;
            text-shadow: 2px 2px #d35400;
        }
        p {
            margin: 0 0 10px 0;
            color: #bdc3c7;
            font-size: 12px;
        }
        #gameCanvas {
            background: #34495e;
            border: 4px solid #f1c40f;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            display: block;
            max-width: 90vw;
            max-height: 60vh;
        }
        /* Kontrol Khusus HP Android */
        .mobile-controls {
            display: flex;
            justify-content: space-between;
            width: 85vw;
            max-width: 400px;
            margin-top: 15px;
        }
        .btn-control {
            width: 45%;
            height: 60px;
            background: #e74c3c;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 6px #c0392b;
            touch-action: manipulation;
        }
        .btn-control:active {
            box-shadow: 0 2px #c0392b;
            transform: translateY(4px);
            background: #d63031;
        }
    </style>
</head>
<body>

    <div class="top-left-logos">
        <img src="rpl.jpeg" alt="Logo RPL">
        <img src="smkn1sanden.jpeg" alt="Logo SMKN 1 Sanden">
        <img src="icgrup.jpeg" alt="Logo IC GRUP">
    </div>

    <h1>GAME SUKUTY 🛵✨</h1>
    <p>Sentuh tombol di bawah untuk menghindari mobil!</p>

    <canvas id="gameCanvas" width="400" height="500"></canvas>

    <div class="mobile-controls">
        <button class="btn-control" id="btnLeft">◀️</button>
        <button class="btn-control" id="btnRight">▶️</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // State Game
        let score = 0;
        let gameOver = false;
        let frames = 0;

        // Karakter Sukuty (Pemain)
        const scooty = {
            x: canvas.width / 2 - 15,
            y: canvas.height - 90,
            width: 30,
            height: 50,
            speed: 6,
            color: '#e74c3c'
        };

        // Rintangan & Koin
        let obstacles = [];
        let coins = [];

        // Kontrol Input (PC & HP)
        let keys = {};
        let isMovingLeft = false;
        let isMovingRight = false;

        // Event Listener PC
        document.addEventListener('keydown', (e) => keys[e.key] = true);
        document.addEventListener('keyup', (e) => keys[e.key] = false);

        // Event Listener HP (Touch)
        const btnLeft = document.getElementById('btnLeft');
        const btnRight = document.getElementById('btnRight');

        btnLeft.addEventListener('touchstart', (e) => { e.preventDefault(); isMovingLeft = true; });
        btnLeft.addEventListener('touchend', () => isMovingLeft = false);
        btnRight.addEventListener('touchstart', (e) => { e.preventDefault(); isMovingRight = true; });
        btnRight.addEventListener('touchend', () => isMovingRight = false);

        // Restart Game
        canvas.addEventListener('touchstart', () => { if (gameOver) resetGame(); });
        canvas.addEventListener('click', () => { if (gameOver) resetGame(); });

        function resetGame() {
            score = 0;
            gameOver = false;
            frames = 0;
            scooty.x = canvas.width / 2 - 15;
            obstacles = [];
            coins = [];
        }

        function spawnObjects() {
            // KALKULASI TINGKAT KESULITAN BERDASARKAN SKOR
            // Setiap 10 koin (+100 skor), level bertambah
            let speedBonus = Math.floor(score / 30) * 0.8; // Kecepatan melaju bertambah
            
            // Jarak spasi spawn objek semakin sering (minimal batas 25 frame)
            let spawnIntervalObs = Math.max(25, 80 - Math.floor(score / 20) * 5);

            // Spawn Rintangan
            if (frames % spawnIntervalObs === 0) { 
                let obsX = Math.random() * (canvas.width - 40);
                obstacles.push({ 
                    x: obsX, 
                    y: -50, 
                    width: 40, 
                    height: 40, 
                    speed: 4.5 + speedBonus 
                });
            }

            // Spawn Koin
            if (frames % 100 === 0) { 
                let coinX = Math.random() * (canvas.width - 20);
                coins.push({ 
                    x: coinX, 
                    y: -30, 
                    radius: 10, 
                    speed: 3.5 + speedBonus 
                });
            }
        }

        function update() {
            if (gameOver) return;

            frames++;
            spawnObjects();

            // Gerakan pemain
            if ((keys['ArrowLeft'] || keys['a'] || keys['A'] || isMovingLeft) && scooty.x > 0) {
                scooty.x -= scooty.speed;
            }
            if ((keys['ArrowRight'] || keys['d'] || keys['D'] || isMovingRight) && scooty.x < canvas.width - scooty.width) {
                scooty.x += scooty.speed;
            }

            // Update Rintangan
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].y += obstacles[i].speed;

                // Cek Tabrakan Rintangan
                if (scooty.x < obstacles[i].x + obstacles[i].width &&
                    scooty.x + scooty.width > obstacles[i].x &&
                    scooty.y < obstacles[i].y + obstacles[i].height &&
                    scooty.y + scooty.height > obstacles[i].y) {
                    gameOver = true;
                }

                if (obstacles[i].y > canvas.height) obstacles.splice(i, 1);
            }

            // Update Koin
            for (let i = coins.length - 1; i >= 0; i--) {
                coins[i].y += coins[i].speed;

                // Cek Ambil Koin
                let distX = Math.abs(coins[i].x - (scooty.x + scooty.width/2));
                let distY = Math.abs(coins[i].y - (scooty.y + scooty.height/2));

                if (distX < (scooty.width/2 + coins[i].radius) && distY < (scooty.height/2 + coins[i].radius)) {
                    score += 10;
                    coins.splice(i, 1);
                    continue;
                }

                if (coins[i].y > canvas.height) coins.splice(i, 1);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Gambar Jalanan
            ctx.fillStyle = '#7f8c8d';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Kecepatan animasi garis jalanan juga ikut meningkat seiring skor!
            let lineSpeedBonus = Math.floor(score / 30) * 1.5;
            ctx.strokeStyle = '#ffffff';
            ctx.setLineDash([20, 20]);
            ctx.lineDashOffset = -frames * (5 + lineSpeedBonus);
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();

            // Gambar Sukuty
            ctx.fillStyle = scooty.color;
            ctx.fillRect(scooty.x, scooty.y, scooty.width, scooty.height);
            ctx.fillStyle = '#fff';
            ctx.fillRect(scooty.x + 5, scooty.y, scooty.width - 10, 5);

            // Gambar Rintangan (Mobil Musuh)
            ctx.fillStyle = '#2c3e50';
            obstacles.forEach(obs => {
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
            });

            // Gambar Koin
            ctx.fillStyle = '#f1c40f';
            coins.forEach(coin => {
                ctx.beginPath();
                ctx.arc(coin.x, coin.y, coin.radius, 0, Math.PI * 2);
                ctx.fill();
            });

            // Papan Skor & Level Kecepatan
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 18px Arial';
            ctx.textAlign = 'left';
            ctx.fillText(`Skor: ${score}`, 20, 35);
            
            // Indikator Kecepatan/Laju Jalan
            let currentSpeedLvl = 1 + Math.floor(score / 30);
            ctx.fillStyle = '#f1c40f';
            ctx.font = 'bold 14px Arial';
            ctx.fillText(`Kecepatan: Lvl ${currentSpeedLvl}`, 20, 58);

            // Tampilan Game Over
            if (gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#e74c3c';
                ctx.font = 'bold 32px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER 💥', canvas.width / 2, canvas.height / 2 - 20);
                
                ctx.fillStyle = '#ffffff';
                ctx.font = '16px Arial';
                ctx.fillText(`Total Skor Kamu: ${score}`, canvas.width / 2, canvas.height / 2 + 15);
                
                ctx.fillStyle = '#2ecc71';
                ctx.font = 'bold 14px Arial';
                ctx.fillText('KETUK LAYAR UNTUK MAIN LAGI', canvas.width / 2, canvas.height / 2 + 55);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
