<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scooty Simulator mini-game</title>
    <style>
        body {
            margin: 0;
            background: #2c3e50;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
            overflow: hidden;
        }
        h1 {
            margin: 5px 0;
        }
        p {
            margin: 5px 0 15px 0;
            color: #bdc3c7;
        }
        #gameCanvas {
            background: #34495e;
            border: 4px solid #34495e;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .controls {
            margin-top: 15px;
            background: rgba(0,0,0,0.2);
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h1>Scooty Simulator 🛵</h1>
    <p>Hindari rintangan jalanan dan kumpulkan koin!</p>

    <canvas id="gameCanvas" width="400" height="500"></canvas>

    <div class="controls">
        <strong>Kontrol:</strong> Gunakan Panah Kiri (←) dan Kanan (→) untuk bergerak.
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // State Game
        let score = 0;
        let gameOver = false;

        // Karakter Scooty (Pemain)
        const scooty = {
            x: canvas.width / 2 - 15,
            y: canvas.height - 80,
            width: 30,
            height: 50,
            speed: 5,
            color: '#e74c3c'
        };

        // Rintangan (Mobil/Lubang) & Koin
        let obstacles = [];
        let coins = [];
        let frames = 0;

        // Kontrol Input
        let keys = {};
        document.addEventListener('keydown', (e) => keys[e.key] = true);
        document.addEventListener('keyup', (e) => keys[e.key] = false);

        function spawnObjects() {
            if (frames % 90 === 0) { // Setiap 1,5 detik
                let obsX = Math.random() * (canvas.width - 40);
                obstacles.push({ x: obsX, y: -50, width: 40, height: 40, color: '#95a5a6', speed: 4 });
            }
            if (frames % 120 === 0) { // Setiap 2 detik
                let coinX = Math.random() * (canvas.width - 20);
                coins.push({ x: coinX, y: -30, radius: 10, color: '#f1c40f', speed: 3 });
            }
        }

        function update() {
            if (gameOver) return;

            frames++;
            spawnObjects();

            // Gerakan pemain
            if ((keys['ArrowLeft'] || keys['a']) && scooty.x > 0) scooty.x -= scooty.speed;
            if ((keys['ArrowRight'] || keys['d']) && scooty.x < canvas.width - scooty.width) scooty.x += scooty.speed;

            // Update Rintangan
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].y += obstacles[i].speed;

                // Cek Tabrakan Rintangan
                if (scooty.x < obstacles[i].x + obstacles[i].width &&
                    scooty.x + scooty.width > obstacles[i].x &&
                    scooty.y < obstacles[i].y + obstacles[i].height &&
                    scooty.y + scooty.height > obstacles[i].y) {
                    gameOver = true;
                }

                if (obstacles[i].y > canvas.height) obstacles.splice(i, 1);
            }

            // Update Koin
            for (let i = coins.length - 1; i >= 0; i--) {
                coins[i].y += coins[i].speed;

                // Cek Ambil Koin
                let distX = Math.abs(coins[i].x - (scooty.x + scooty.width/2));
                let distY = Math.abs(coins[i].y - (scooty.y + scooty.height/2));

                if (distX < (scooty.width/2 + coins[i].radius) && distY < (scooty.height/2 + coins[i].radius)) {
                    score += 10;
                    coins.splice(i, 1);
                    continue;
                }

                if (coins[i].y > canvas.height) coins.splice(i, 1);
            }
        }

        function draw() {
            // Bersihkan Canvas & Gambar Jalanan
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#7f8c8d';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Garis pembatas jalan (efek bergerak)
            ctx.strokeStyle = '#ffffff';
            ctx.setLineDash([20, 20]);
            ctx.lineDashOffset = -frames * 4;
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();

            // Gambar Scooty
            ctx.fillStyle = scooty.color;
            ctx.fillRect(scooty.x, scooty.y, scooty.width, scooty.height);
            // Lampu depan scooty
            ctx.fillStyle = '#fff';
            ctx.fillRect(scooty.x + 5, scooty.y, scooty.width - 10, 5);

            // Gambar Rintangan
            ctx.fillStyle = '#2c3e50';
            obstacles.forEach(obs => {
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
            });

            // Gambar Koin
            ctx.fillStyle = '#f1c40f';
            coins.forEach(coin => {
                ctx.beginPath();
                ctx.arc(coin.x, coin.y, coin.radius, 0, Math.PI * 2);
                ctx.fill();
            });

            // Gambar Score
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 20px Arial';
            ctx.fillText(`Skor: ${score}`, 20, 35);

            // Layar Game Over
            if (gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#e74c3c';
                ctx.font = 'bold 30px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER 💥', canvas.width / 2, canvas.height / 2 - 10);
                ctx.fillStyle = '#ffffff';
                ctx.font = '16px Arial';
                ctx.fillText('Tekan F5 untuk main lagi', canvas.width / 2, canvas.height / 2 + 25);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
