<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Game Sukuty Mandiri - PASTI JALAN</title>
    <style>
        /* --- Reset & Layout Dasar --- */
        body {
            margin: 0;
            padding: 0;
            background: #2c3e50; /* Warna gelap monitor */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
            overflow: hidden; /* Mencegah scroll saat main di HP */
            user-select: none;
            -webkit-user-select: none;
        }

        /* Container Judul (Header) */
        #header-text {
            text-align: center;
            margin-bottom: 10px;
        }

        #game-title {
            margin: 5px 0 2px 0;
            font-size: 24px;
            color: #f1c40f; /* Warna kuning */
            text-shadow: 2px 2px #d35400;
        }

        #game-title span.emoji {
            font-size: 20px;
        }

        #instruction {
            margin: 0;
            color: #bdc3c7;
            font-size: 12px;
        }

        /* --- Bingkai Canvas (Monitor area) --- */
        #game-viewport {
            position: relative; /* Wadah untuk overlay */
            background-color: #bdc3c7; /* Latar biru muda layar game */
            border: 4px solid #f1c40f; /* Bingkai kuning tebal */
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            max-width: 90vw;
            max-height: 60vh;
            overflow: hidden;
            display: flex; /* Centering canvas */
            justify-content: center;
            align-items: center;
        }

        #gameCanvas {
            display: block; /* Menghilangkan celah bawah */
            background: #bdc3c7;
            cursor: none; /* Sembunyikan kursor di canvas */
        }

        /* Area Teks UI di dalam Canvas digambar oleh JS */

        /* --- Layar Loading (Dihapus karena game ini mandiri) --- */
        /* #loading-screen { ... } */

        /* --- Layar Game Over --- */
        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            display: none; /* Sembunyi awal */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
            border-radius: 8px;
        }

        #game-over-screen h2 {
            font-size: 32px;
            color: #e74c3c;
            margin: 0 0 10px 0;
        }

        #game-over-screen p {
            margin: 5px 0;
            font-size: 18px;
        }

        #restart-btn {
            margin-top: 20px;
            padding: 12px 24px;
            font-size: 18px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px #27ae60;
            outline: none;
        }
        
        #restart-btn:active {
            box-shadow: 0 1px #27ae60;
            transform: translateY(3px);
        }

        /* --- Tombol Kontrol Bawah (Mobile) --- */
        .mobile-controls {
            display: flex;
            justify-content: space-between;
            width: 85vw;
            max-width: 400px;
            margin-top: 15px;
        }

        .btn-control {
            width: 45%;
            height: 60px;
            background-color: #e74c3c; /* Placeholder merah tombol */
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 6px #c0392b; /* Efek 3D */
            touch-action: manipulation;
            cursor: pointer;
            outline: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-control:active {
            box-shadow: 0 2px #c0392b;
            transform: translateY(4px);
            background-color: #d63031;
        }

    </style>
</head>
<body>

    <div id="header-text">
        <h1 id="game-title">GAME SUKUTY <span class="emoji">🛵✨</span></h1>
        <p id="instruction">Sentuh tombol di bawah atau gunakan panah keyboard untuk menghindari kotak dan ambil koin!</p>
    </div>

    <div id="game-viewport">
        <canvas id="gameCanvas" width="360" height="480"></canvas>

        <div id="game-over-screen">
            <h2>GAME OVER!</h2>
            <p id="final-money">Total Uang: Rp 0</p>
            <button id="restart-btn">Main Lagi</button>
        </div>
    </div>

    <div class="mobile-controls">
        <button class="btn-control" id="btnLeft">◀️</button>
        <button class="btn-control" id="btnRight">▶️</button>
    </div>

    <script>
        // --- Setup & Variabel Global ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalMoneyText = document.getElementById('final-money');

        // Dimensi objek (px)
        const playerWidth = 40;
        const playerHeight = 60;
        const obstacleWidth = 50;
        const obstacleHeight = 50;
        const coinRadius = 25; // Diameter 50px

        // State Game
        let isGameRunning = true; // Game MANDIRI, langsung jalan
        let moneyScore = 0;
        let gameLevel = 1;
        let frames = 0;
        let gameSpeed = 4; // Kecepatan objek jatuh (px per frame)
        
        // Posisi Pemain (Bentuk kotak merah)
        let player = {
            x: canvas.width / 2 - playerWidth / 2, // Tengah awal
            y: canvas.height - playerHeight - 30, // Dekat bawah
            speed: 5
        };

        // Array untuk menyimpan objek dinamis
        let obstacles = []; // Bentuk kotak biru
        let coins = []; // Bentuk lingkaran emas berlogo '$'

        // Kontrol Input
        let keys = { left: false, right: false };

        // --- Event Listeners ---
        // Keyboard (PC)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') keys.left = true;
            if (e.key === 'ArrowRight') keys.right = true;
        });
        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft') keys.left = false;
            if (e.key === 'ArrowRight') keys.right = false;
        });

        // Tombol UI Bawah (Mobile/PC)
        // Kiri
        document.getElementById('btnLeft').addEventListener('touchstart', (e) => { e.preventDefault(); keys.left = true; });
        document.getElementById('btnLeft').addEventListener('touchend', () => keys.left = false);
        document.getElementById('btnLeft').addEventListener('mousedown', () => keys.left = true);
        document.getElementById('btnLeft').addEventListener('mouseup', () => keys.left = false);
        document.getElementById('btnLeft').addEventListener('mouseleave', () => keys.left = false); // Jika kursor keluar tombol

        // Kanan
        document.getElementById('btnRight').addEventListener('touchstart', (e) => { e.preventDefault(); keys.right = true; });
        document.getElementById('btnRight').addEventListener('touchend', () => keys.right = false);
        document.getElementById('btnRight').addEventListener('mousedown', () => keys.right = true);
        document.getElementById('btnRight').addEventListener('mouseup', () => keys.right = false);
        document.getElementById('btnRight').addEventListener('mouseleave', () => keys.right = false);

        // Restart Game
        document.getElementById('restart-btn').addEventListener('click', () => {
            resetGame();
        });

        // --- Fungsi Utama Game ---

        function drawPlayer() {
            // Gambar Kotak Merah Cerah (Pemain/Skuter)
            ctx.fillStyle = '#e74c3c'; // Merah Alizarin
            ctx.fillRect(player.x, player.y, playerWidth, playerHeight);
            
            // Gambar detail sederhana (Lampu)
            ctx.fillStyle = 'white';
            ctx.fillRect(player.x + 15, player.y + 10, 10, 10);
        }

        function drawObjects() {
            // Menggambar Rintangan (Kotak Biru Peter River)
            ctx.fillStyle = '#3498db'; 
            obstacles.forEach(obs => {
                ctx.fillRect(obs.x, obs.y, obstacleWidth, obstacleHeight);
            });

            // Menggambar Koin (Lingkaran Emas berlogo '$')
            ctx.fillStyle = '#f1c40f'; // Emas
            ctx.strokeStyle = '#d35400'; // Pinggiran oranye gelap
            ctx.lineWidth = 3;
            coins.forEach(coin => {
                ctx.beginPath();
                ctx.arc(coin.x, coin.y, coinRadius, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
                
                // Gambar simbol '$' sederhana
                ctx.fillStyle = '#d35400';
                ctx.font = 'bold 20px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('$', coin.x, coin.y);
            });
        }

        function drawUI() {
            // Gambar teks UI langsung di atas Canvas
            ctx.fillStyle = '#34495e'; // Warna gelap teks
            ctx.font = 'bold 18px Segoe UI';
            ctx.textAlign = 'left';
            ctx.fillText(`Uang: Rp ${moneyScore.toLocaleString('id-ID')}`, 15, 25);
            
            ctx.fillStyle = '#f1c40f'; // Warna kuning kecepatan
            ctx.font = 'bold 14px Segoe UI';
            ctx.fillText(`Kecepatan: Lvl ${gameLevel}`, 15, 45);
        }

        function drawRoadLines() {
            // Garis putus-putus tengah jalan
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 4;
            ctx.setLineDash([20, 20]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]); // Reset agar garis lain tidak putus-putus
        }

        // --- Logika Game ---

        function updateGame() {
            if (!isGameRunning) return;

            frames++;

            // Pergerakan Pemain
            if (keys.left && player.x > 0) {
                player.x -= player.speed;
            }
            if (keys.right && player.x < canvas.width - playerWidth) {
                player.x += player.speed;
            }

            // Spawn objek baru secara acak
            if (frames % 100 === 0) { // Kotak musuh
                let spawnX = Math.random() * (canvas.width - obstacleWidth);
                obstacles.push({ x: spawnX, y: -obstacleHeight });
            }
            if (frames % 150 === 0) { // Koin emas (lebih jarang)
                let spawnX = Math.random() * (canvas.width - (coinRadius * 2)) + coinRadius;
                coins.push({ x: spawnX, y: -coinRadius * 2 });
            }

            // Pergerakan objek jatuh
            let currentSpeed = gameSpeed + (gameLevel * 0.5);
            obstacles.forEach(obs => obs.y += currentSpeed);
            coins.forEach(coin => coin.y += currentSpeed * 0.8); // Koin sedikit lebih lambat

            // Hapus objek yang keluar layar
            obstacles = obstacles.filter(obs => obs.y < canvas.height);
            coins = coins.filter(coin => coin.y < canvas.height);

            // Cek Tabrakan
            checkCollisions();

            // Naikkan Level
            if (frames % 1000 === 0) { // Setiap ~16 detik
                gameLevel++;
            }
        }

        function checkCollisions() {
            const playerRect = {
                left: player.x,
                right: player.x + playerWidth,
                top: player.y,
                bottom: player.y + playerHeight
            };

            // Cek rintangan kotak (Kotak vs Kotak)
            for (let i = 0; i < obstacles.length; i++) {
                const obs = obstacles[i];
                if (
                    playerRect.left < obs.x + obstacleWidth &&
                    playerRect.right > obs.x &&
                    playerRect.top < obs.y + obstacleHeight &&
                    playerRect.bottom > obs.y
                ) {
                    endGame();
                    return;
                }
            }

            // Cek koin (Kotak vs Lingkaran - disederhanakan)
            for (let i = coins.length - 1; i >= 0; i--) {
                const coin = coins[i];
                let closestX = Math.max(playerRect.left, Math.min(coin.x, playerRect.right));
                let closestY = Math.max(playerRect.top, Math.min(coin.y, playerRect.bottom));
                
                let distanceX = coin.x - closestX;
                let distanceY = coin.y - closestY;
                let distanceSquared = (distanceX * distanceX) + (distanceY * distanceY);

                if (distanceSquared < (coinRadius * coinRadius)) {
                    moneyScore += 100;
                    coins.splice(i, 1);
                }
            }
        }

        function endGame() {
            isGameRunning = false;
            finalMoneyText.textContent = `Total Uang: Rp ${moneyScore.toLocaleString('id-ID')}`;
            gameOverScreen.style.display = 'flex';
        }

        function resetGame() {
            moneyScore = 0;
            gameLevel = 1;
            frames = 0;
            player.x = canvas.width / 2 - playerWidth / 2;
            obstacles = [];
            coins = [];
            gameOverScreen.style.display = 'none';
            isGameRunning = true;
        }

        // --- Loop Utama Game ---
        function gameLoop() {
            if (isGameRunning) {
                ctx.clearRect(0, 0, canvas.width, canvas.height); // Bersihkan canvas
                drawRoadLines();
                drawObjects();
                drawPlayer();
                drawUI();
                updateGame();
            }
            requestAnimationFrame(gameLoop);
        }

        // Mulai game loop
        gameLoop();

    </script>
</body>
</html>
